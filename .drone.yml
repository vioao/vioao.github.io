kind: pipeline
name: default

steps:
  - name: build
    image: node
    volumes:
      - name: target
        path: /drone/target/vioao.github.io
    commands:
      - pwd
      - npm install
      - ./node_modules/hexo/bin/hexo clean
      - ./node_modules/hexo/bin/hexo g
      - rm -rf /drone/target/vioao.github.io/*
      - mv /drone/src/public /drone/target/vioao.github.io
    when:
      branch:
        - blog

volumes:
  - name: target
    host:
      path: /var/www/mine