kind: pipeline
name: default

steps:
  - name: build
    image: node
    commands:
      - pwd
      - npm install
      - ./node_modules/hexo/bin/hexo clean
      - ./node_modules/hexo/bin/hexo g
    when:
      branch:
        - blog

  - name: deploy
    volumes:
      - name: target
        path: /drone/target/vioao.github.io
    commands:
      - pwd
      - rm -rf /drone/target/vioao.github.io/*
      - mv /drone/src/public/* /drone/target/vioao.github.io
      - cd /drone/target/vioao.github.io && ll

volumes:
  - name: target
    host:
      path: /var/www/mine