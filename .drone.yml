kind: pipeline
name: default

steps:
  - name: build
    image: node
    volumes:
      - name: target
        path: /drone/target/vioao.github.io
    commands:
      - npm install
      - ./node_modules/hexo/bin/hexo clean
      - ./node_modules/hexo/bin/hexo g
      - pwd && rm -rf /drone/target/vioao.github.io/*
      - cp -r /drone/src/public/* /drone/target/vioao.github.io
      - cp -r /drone/src/public/* /drone/src/githubpages
      - cp -r /drone/src/public/* /drone/src/codingpages
      - cd /drone/target/vioao.github.io && ls -l
    when:
      branch:
        - blog

  - name: publish github pages
    image: plugins/gh-pages
    settings:
      remote_url: https://github.com/vioao/vioao.github.io.git
      pages_directory: githubpages
      target_branch: master
      temporary_base: .github_tmp
      username:
        from_secret: github_username
      password:
        from_secret: github_password

  - name: publish coding pages
    image: plugins/gh-pages
    environment:
      DRONE_REMOTE_URL: https://git.coding.net/vioao/vioao.git
    settings:
      pages_directory: codingpages
      target_branch: master
      temporary_base: .coding_tmp
      username:
        from_secret: coding_username
      password:
        from_secret: coding_password

volumes:
  - name: target
    host:
      path: /var/www/mine
