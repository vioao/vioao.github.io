kind: pipeline
name: default

steps:
  - name: build
    image: node
    volumes:
      - name: target
        path: /drone/target/vioao.github.io
    commands:
      - npm install
      - ./node_modules/hexo/bin/hexo clean
      - ./node_modules/hexo/bin/hexo g
      - pwd && rm -rf /drone/target/vioao.github.io/*
      - mv /drone/src/public/* /drone/target/vioao.github.io
      - cd /drone/target/vioao.github.io && ls -l
    when:
      branch:
        - blog

  - name: publish_to_github
    image: plugins/gh-pages
    settings:
      username:
        from_secret: github_username
      password:
        from_secret: github_password
      pages_directory: public/
      target_branch: master
      remote_url: https://github.com/vioao/vioao.github.io.git

  - name: publish_to_coding
    image: plugins/gh-pages
    settings:
      username:
        from_secret: coding_user_name
      password:
        from_secret: coding_password
      pages_directory: public/
      target_branch: master
      remote_url: https://gitee.com/vioao/vioao.github.io.git

volumes:
  - name: target
    host:
      path: /var/www/mine